# render.yaml — for Render.com one-click deploy
services:
  - type: web
    name: sales-crm-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sales-crm-db
          property: connectionString

databases:
  - name: sales-crm-db
    plan: free
